[build]
  publish = "dist"
  command = "npm run build"

# Proxy API to PlayTonight host so https://nutradashboard.v1mobi.com/api/... avoids browser CORS.
# Keep this block *before* the SPA fallback.
[[redirects]]
  from = "/api/*"
  to = "https://pu.playtonight.fun/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"
  # Leave VITE_API_BASE_URL unset: the app uses window.location.origin (your dashboard URL) + proxy above.
  VITE_API_REPORT_ENDPOINT = "/api/payment/report/bucket-wise"
  VITE_APP_TITLE = "Nutra Dashboard"

